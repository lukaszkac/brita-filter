blueprint:
  name: Brita Filter – notifications
  description: >
    Send notifications when the Brita filter needs replacement.
    Supports any notification service (mobile app, Telegram, etc.).
    Optionally sends a daily morning reminder when the filter is overdue.
  domain: automation
  source_url: https://raw.githubusercontent.com/lukaszkac/brita-filter/master/blueprints/automation/brita_filter_notifications.yaml

  input:
    filter_entities:
      name: Filter sensors
      icon: mdi:water-check
      input:
        filter_status_entity:
          name: Filter status entity
          description: "The 'Filter status' sensor from the Brita Filter integration."
          default: sensor.brita_filter_status
          selector:
            entity:
              filter:
                - integration: brita_filter
                  domain: sensor
                  entity_id: "sensor.brita_filter_status*"

        filter_days_entity:
          name: Days since replacement entity
          description: "The 'Days since replacement' sensor from the Brita Filter integration."
          default: sensor.brita_filter_days_since
          selector:
            entity:
              filter:
                - integration: brita_filter
                  domain: sensor
                  entity_id: "sensor.brita_filter_days_since*"

        filter_pct_entity:
          name: Filter remaining entity
          description: "The 'Filter remaining' (%) sensor from the Brita Filter integration."
          default: sensor.brita_filter_remaining
          selector:
            entity:
              filter:
                - integration: brita_filter
                  domain: sensor
                  entity_id: "sensor.brita_filter_remaining*"

    notifications:
      name: Notifications
      icon: mdi:bell
      input:
        notify_service:
          name: Notification service
          description: "Select the service to send notifications to."
          selector:
            notify: {}

        message_language:
          name: Notification language
          description: Language used for notification title and message.
          default: en
          selector:
            select:
              options:
                - label: English
                  value: en
                - label: Polski
                  value: pl

        notify_replace_soon:
          name: Notify when filter is nearing end of life
          description: Send a notification when status changes to "Replace soon".
          default: true
          selector:
            boolean: {}

        notify_replace_now:
          name: Notify when filter is overdue
          description: Send a notification when status changes to "Replace now!".
          default: true
          selector:
            boolean: {}

    reminders:
      name: Daily reminder
      icon: mdi:clock-alert
      input:
        daily_reminder:
          name: Enable daily morning reminder
          description: >
            Send a daily reminder at a set time when the filter is overdue.
          default: false
          selector:
            boolean: {}

        reminder_time:
          name: Daily reminder time
          description: Time to send the daily reminder (only used if daily reminder is enabled).
          default: "08:00:00"
          selector:
            time: {}

variables:
  filter_status_entity: !input filter_status_entity
  filter_days_entity: !input filter_days_entity
  filter_pct_entity: !input filter_pct_entity
  notify_replace_soon: !input notify_replace_soon
  notify_replace_now: !input notify_replace_now
  daily_reminder: !input daily_reminder
  message_language: !input message_language

trigger:
  - platform: state
    entity_id: !input filter_status_entity
    to: replace_soon
    id: replace_soon

  - platform: state
    entity_id: !input filter_status_entity
    to: replace_now
    id: replace_now

  - platform: time
    at: !input reminder_time
    id: daily

condition:
  - condition: template
    value_template: >
      {% if trigger.id == 'replace_soon' %}
        {{ notify_replace_soon }}
      {% elif trigger.id == 'replace_now' %}
        {{ notify_replace_now }}
      {% elif trigger.id == 'daily' %}
        {{ daily_reminder and states(filter_status_entity) == 'replace_now' }}
      {% else %}
        false
      {% endif %}

action:
  - variables:
      days_used: "{{ states(filter_days_entity) | int(0) }}"
      pct_remaining: "{{ states(filter_pct_entity) | int(0) }}"

  - action: "notify.{{ notify_service }}"
    data:
      title: >
        {% if message_language == 'pl' %}
          {% if trigger.id in ['replace_now', 'daily'] %}
            💧 Brita – Wymień filtr!
          {% else %}
            💧 Brita – Filtr kończy się
          {% endif %}
        {% else %}
          {% if trigger.id in ['replace_now', 'daily'] %}
            💧 Brita – Replace filter!
          {% else %}
            💧 Brita – Filter nearing end of life
          {% endif %}
        {% endif %}
      message: >
        {% if message_language == 'pl' %}
          {% if trigger.id == 'replace_soon' %}
            Filtr Brita jest na poziomie {{ pct_remaining }}% — czas zamówić nowy wkład.
            Filtr pracuje od {{ days_used }} dni.
          {% elif trigger.id in ['replace_now', 'daily'] %}
            Filtr Brita wymaga wymiany! Pracuje już {{ days_used }} dni.
            Wymień filtr jak najszybciej.
          {% endif %}
        {% else %}
          {% if trigger.id == 'replace_soon' %}
            Your Brita filter is at {{ pct_remaining }}% — time to order a replacement.
            It has been running for {{ days_used }} days.
          {% elif trigger.id in ['replace_now', 'daily'] %}
            Your Brita filter is overdue! It has been running for {{ days_used }} days.
            Please replace the filter as soon as possible.
          {% endif %}
        {% endif %}

mode: single
